services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mix",
        "run",
        "--no-start",
        "--no-halt",
        "-e",
        "Application.ensure_all_started(:server)",
      ]
    ports:
      - "4000:4000/tcp"
      - "5000:5000/udp"
    restart: unless-stopped

  sensor1:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mix",
        "run",
        "--no-start",
        "--no-halt",
        "-e",
        "Application.ensure_all_started(:sensor)",
      ]
    environment:
      SERVER_IP: "server"
      SERVER_PORT: "5000"
    depends_on:
      - server
    restart: unless-stopped

  sensor2:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mix",
        "run",
        "--no-start",
        "--no-halt",
        "-e",
        "Application.ensure_all_started(:sensor)",
      ]
    environment:
      SERVER_IP: "server"
      SERVER_PORT: "5000"
    depends_on:
      - server
    restart: unless-stopped

  actuator:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mix",
        "run",
        "--no-start",
        "--no-halt",
        "-e",
        "Application.ensure_all_started(:actuator)",
      ]
    environment:
      SERVER_IP: "server"
      SERVER_PORT: "4000"
    depends_on:
      - server
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true

    command:
      [
        "mix",
        "run",
        "--no-start",
        "--no-halt",
        "-e",
        "Application.ensure_all_started(:client)",
      ]
    environment:
      SERVER_IP: "server"
      SERVER_PORT: "4000"
      IS_CLIENT: "true" # <-- Adicione isso
    depends_on:
      - server
    restart: unless-stopped

  client2:
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    tty: true

    command:
      [
        "mix",
        "run",
        "--no-start",
        "--no-halt",
        "-e",
        "Application.ensure_all_started(:client)",
      ]
    environment:
      SERVER_IP: "server"
      SERVER_PORT: "4000"
      IS_CLIENT: "true" # <-- Adicione isso
    depends_on:
      - server
    restart: unless-stopped
