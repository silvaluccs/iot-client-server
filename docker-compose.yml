services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mix",
        "run",
        "--no-start",
        "--no-halt",
        "-e",
        "Application.ensure_all_started(:server)",
      ]
    ports:
      - "4000:4000/tcp"
      - "5000:5000/udp"
    restart: unless-stopped

  sensor1:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mix",
        "run",
        "--no-start",
        "--no-halt",
        "-e",
        "Application.ensure_all_started(:sensor)",
      ]
    environment:
      SERVER_HOST: "server"
      SERVER_PORT: "5000"
    depends_on:
      - server
    restart: unless-stopped

  sensor2:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "mix",
        "run",
        "--no-start",
        "--no-halt",
        "-e",
        "Application.ensure_all_started(:sensor)",
      ]
    environment:
      SERVER_HOST: "server"
      SERVER_PORT: "5000"
    depends_on:
      - server
    restart: unless-stopped
